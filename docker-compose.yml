
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: combounsa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d combounsa"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: combounsa
      DATABASE_USER: admin
      DATABASE_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CULQI_SECRET_KEY: ${CULQI_SECRET_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src   # hot reload con ts-node en dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - API_URL_INTERNAL=http://backend:3001/api
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
